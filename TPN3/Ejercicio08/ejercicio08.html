<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ejercicio08.css">
    <title>Ejercicio08</title>
</head>
<body>
    <main>
        <header>
            <h1>Settigns</h1>
        </header>
        <hr>
        <form action="submit">
            <div class="row-account">
                <div class="title-section">
                    <h4>Account</h4>
                </div>
                <div class="account-data">
                    <div class="username">
                        <label for="user-name">Full Name</label>
                        <input type="text" id="user-name" required>
                    </div>
                    <div class="user-email">
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" required>
                    </div>
                    <div class="user-phone">
                        <label for="user-phone">Phone Number</label>
                        <input type="text" id="user-phone">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row-billing">
                <div class="title-billing">
                    <h4>Billing</h4>
                </div>
                <div class="billing-data">
                    <div class="user-plan">
                        <label for="user-plan">Plan</label>
                        <input type="text" id="user-plan" required>
                    </div>
                    <div class="user-billing">
                        <label for="interval">Billing Interval</label>
                        <select name="interval" id="interval">
                            <option value="#">Monthly</option>
                        </select>
                    </div>
                </div>
            </div>
            <hr>
            <div class="row-business">
                <div class="title-business">
                    <h4>Business Address</h4>
                </div>
                <div class="business-data">
                    <div class="street">
                        <label for="user-address">Street Address</label>
                        <input type="text" id="user-address">
                    </div>
                    <div class="group">
                        <div class="city">
                            <label for="user-city">City</label>
                            <input type="text" id="user-city">
                        </div>
                        <div class="user-province">
                            <label for="province">Province</label>
                            <select name="province" id="province">
                                <option value="#">Ontario</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="group">
                        <div class="user-postal">
                            <label for="postal">ZIP/Postal Code</label>
                            <input type="text" id="postal" required>
                        </div>
                        <div class="user-country">
                            <label for="country">Country</label>
                            <select name="coutry" id="country">
                                <option value="#">Canada</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <hr>
            <div class="row-change">
                <div class="title-change">
                    <h4>Change Password</h4>
                    <p class="leyenda">Password must be at least 8 characters.</p>
                </div>
                <div class="change-data">
                    <div class="user-password">
                        <label for="user-password">Password</label>
                        <input type="text" id="user-password" required>
                    </div>
                    <div class="user-confirm">
                        <label for="confirm">Confirm Password</label>
                        <input type="text" id="confirm" required>
                    </div>
                </div>
            </div>
            <hr>
            <div class="group-btn">
                <div class="btn1">
                    <button>CANCEL</button>
                </div>
                <div class="btn2">
                    <button>UPDATE</button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
