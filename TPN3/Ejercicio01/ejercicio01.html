<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ejercicio01.css">
    <title>Formulario</title>
</head>
<body>
    <main>
        <section>
            <form>
                <div class="data-user">
                    <div class="name-user">
                        <label for="name">First Name*</label>
                        <input id="name" type="text" placeholder="First Name">
                    </div>
                    <div class="lastname-user">
                        <label for="lastname">Last Name*</label>
                        <input id="lastname" type="text" placeholder="Last Name">
                    </div>
                </div>
                <div class="email-user">
                    <label for="email" class="form-individual">Email*</label>
                    <input id="email" type="text" placeholder="Email Address">
                </div>
                <div class="select-user">
                    <label for="select" class="form-individual">Subject*</label>
                    <select id="select">
                        <option value="#">Select</option>
                    </select>
                </div>
                <div class="comment-user">
                    <label for="area1" class="form-individual">How can we help?*</label>
                    <textarea id="area1" placeholder="Message"></textarea>
                </div>
                <div class="btn-form">
                    <button id="btn" type="submit">Submit</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
